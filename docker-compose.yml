# SickChill Modern. Single container serving the API and the built UI.
# Build:  docker compose build
# Run:    docker compose up -d
services:
  sickchill-modern:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: sickchill-modern:latest
    container_name: sickchill-modern
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # CHANGE THESE before exposing the service.
      SCM_SECRET_KEY: "change-me-to-a-long-random-string"
      SCM_ADMIN_PASSWORD: "change-me-on-first-run"
      # Lock CORS to your own origin in production, or leave empty if same-origin.
      SCM_CORS_ORIGINS: '["http://localhost:8080"]'
    volumes:
      - ./data:/data          # app database + config
      - /volume1/media/tv:/tv # example: your Synology TV library (adjust path)
